<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$page_title</title>
    <link rel="stylesheet" href="/web/static/leaderboard.css?v=$asset_version">
    <script defer src="/web/static/leaderboard.js?v=$asset_version"></script>
  </head>
  <body>
    <main class="page">
      <div class="leaderboard-topbar">
        <nav class="site-nav"><a href="/">← 返回首页</a></nav>
        $scope_tools
      </div>
      $filter_error
      <header class="report-header">
        <div class="title-block">
          <p>$eyebrow</p>
          <h1>$title</h1>
        </div>
        <dl class="summary">
          $summary_items
        </dl>
        <p class="leaderboard-mobile-summary">$mobile_summary</p>
      </header>
      <p class="leaderboard-note">$privacy_note</p>
      $view_controls
      $display_notice
      $feature_grid
      <div class="sort-toolbar" data-sort-toolbar data-sort-target="$sort_target">
        <span>排序</span>
        <button type="button" data-sort-button data-sort-key="wilson" aria-pressed="false">Wilson 下限</button>
        <button type="button" data-sort-button data-sort-key="sample" aria-pressed="true">样本数</button>
      </div>
      $board
      $load_more
    </main>
  </body>
</html>
