name: CI and VPS Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci-deploy.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "README.md"
      - "alembic/**"
      - "src/**"
      - "tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/ci-deploy.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "README.md"
      - "alembic/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: eiketsu-vps-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server]"

      - name: Run pytest
        run: python -m pytest --basetemp .pytest-tmp-run

  package:
    name: Package deploy source
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar -cf eiketsu-vps-update.tar \
            pyproject.toml \
            README.md \
            Dockerfile \
            docker-compose.yml \
            alembic.ini \
            alembic \
            src

      - name: Upload deploy archive
        uses: actions/upload-artifact@v4
        with:
          name: eiketsu-vps-update
          path: eiketsu-vps-update.tar
          retention-days: 14

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Download deploy archive
        uses: actions/download-artifact@v4
        with:
          name: eiketsu-vps-update

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing GitHub Secret: VPS_HOST"
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::Missing GitHub Secret: VPS_USER"
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing GitHub Secret: VPS_SSH_KEY"
            exit 1
          fi
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '\r\n ')"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '\r\n ')"
          VPS_PORT="$(printf '%s' "$VPS_PORT" | tr -d '\r\n ')"
          if printf '%s' "$VPS_HOST" | grep -q '@'; then
            echo "::error::VPS_HOST should be only the host/IP, for example 43.128.xxx.xxx. Do not include ubuntu@."
            exit 1
          fi
          if printf '%s' "$VPS_USER" | grep -q '@'; then
            echo "::error::VPS_USER should be only the username, for example ubuntu. Do not include the host."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/eiketsu_deploy_key
          chmod 600 ~/.ssh/eiketsu_deploy_key
          if ! ssh-keygen -y -f ~/.ssh/eiketsu_deploy_key > /dev/null; then
            echo "::error::VPS_SSH_KEY is not a readable OpenSSH private key. Paste the full private key, not the .pub file or local file path."
            exit 1
          fi
          ssh-keygen -y -f ~/.ssh/eiketsu_deploy_key > ~/.ssh/eiketsu_deploy_key.pub
          ssh-keygen -lf ~/.ssh/eiketsu_deploy_key.pub
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT=22
          fi
          if ! ssh-keyscan -T 15 -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::Cannot read VPS SSH host key. Check VPS_HOST and VPS_PORT."
            exit 255
          fi
          cat > ~/.ssh/config <<EOF
          Host eiketsu-vps
            HostName $VPS_HOST
            User $VPS_USER
            Port $VPS_PORT
            IdentityFile ~/.ssh/eiketsu_deploy_key
            BatchMode yes
            ConnectTimeout 15
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Check SSH login
        run: |
          if ! ssh eiketsu-vps "echo vps-ssh-ok; docker --version; docker compose version"; then
            echo "::error::SSH login failed. Check VPS_USER, VPS_HOST, VPS_PORT, VPS_SSH_KEY, and whether the matching public key is in ~/.ssh/authorized_keys on the VPS."
            exit 255
          fi

      - name: Upload archive to VPS
        run: |
          scp eiketsu-vps-update.tar "eiketsu-vps:/tmp/eiketsu-vps-update-${GITHUB_SHA}.tar"

      - name: Rebuild and restart service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_REMOTE_DIR: ${{ secrets.VPS_REMOTE_DIR }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT=22
          fi
          if [ -z "$VPS_REMOTE_DIR" ]; then
            VPS_REMOTE_DIR='~/eiketsu-env-db'
          fi

          ssh eiketsu-vps \
            "set -e; \
             mkdir -p $VPS_REMOTE_DIR; \
             tar -xf /tmp/eiketsu-vps-update-${GITHUB_SHA}.tar -C $VPS_REMOTE_DIR; \
             cd $VPS_REMOTE_DIR; \
             docker compose build api; \
             docker compose run --rm api alembic upgrade head; \
             docker compose up -d api; \
             docker compose ps; \
             rm -f /tmp/eiketsu-vps-update-${GITHUB_SHA}.tar"
