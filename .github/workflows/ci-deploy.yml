name: CI and VPS Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci-deploy.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "README.md"
      - "alembic/**"
      - "src/**"
      - "tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/ci-deploy.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "README.md"
      - "alembic/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: eiketsu-vps-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server]"

      - name: Run pytest
        run: python -m pytest --basetemp .pytest-tmp-run

  package:
    name: Package deploy source
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar -cf eiketsu-vps-update.tar \
            pyproject.toml \
            README.md \
            Dockerfile \
            docker-compose.yml \
            alembic.ini \
            alembic \
            src

      - name: Upload deploy archive
        uses: actions/upload-artifact@v4
        with:
          name: eiketsu-vps-update
          path: eiketsu-vps-update.tar
          retention-days: 14

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Download deploy archive
        uses: actions/download-artifact@v4
        with:
          name: eiketsu-vps-update

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/eiketsu_deploy_key
          chmod 600 ~/.ssh/eiketsu_deploy_key
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT=22
          fi
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload archive to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT=22
          fi
          scp -i ~/.ssh/eiketsu_deploy_key -P "$VPS_PORT" \
            eiketsu-vps-update.tar \
            "$VPS_USER@$VPS_HOST:/tmp/eiketsu-vps-update-${GITHUB_SHA}.tar"

      - name: Rebuild and restart service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_REMOTE_DIR: ${{ secrets.VPS_REMOTE_DIR }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT=22
          fi
          if [ -z "$VPS_REMOTE_DIR" ]; then
            VPS_REMOTE_DIR='~/eiketsu-env-db'
          fi

          ssh -i ~/.ssh/eiketsu_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -e; \
             mkdir -p $VPS_REMOTE_DIR; \
             tar -xf /tmp/eiketsu-vps-update-${GITHUB_SHA}.tar -C $VPS_REMOTE_DIR; \
             cd $VPS_REMOTE_DIR; \
             docker compose build api; \
             docker compose run --rm api alembic upgrade head; \
             docker compose up -d api; \
             docker compose ps; \
             rm -f /tmp/eiketsu-vps-update-${GITHUB_SHA}.tar"
